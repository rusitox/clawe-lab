name: Kanban — Regenerate Playwright snapshots (Linux)

# Run manually to regenerate Linux visual regression baselines.
# After the resulting PR is merged, remove --grep-invert "Visual regression"
# from kanban-ci.yml so visual tests run on every CI pass.
on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: "Branch to push updated snapshots to (defaults to chore/linux-playwright-snapshots)"
        required: false
        default: "chore/linux-playwright-snapshots"

defaults:
  run:
    working-directory: projects/kanban-dashboard

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "22"
  DATABASE_URL: postgresql+psycopg://kanban:kanban@127.0.0.1:5432/kanban
  DATABASE_URL_TEST: postgresql+psycopg://kanban:kanban@127.0.0.1:5432/kanban_test
  TEST_AUTH_BYPASS: "true"
  APP_ENV: development

jobs:
  update-snapshots:
    name: Regenerate Linux snapshots
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: kanban
          POSTGRES_PASSWORD: kanban
          POSTGRES_DB: kanban
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kanban"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: projects/kanban-dashboard/pyproject.toml

      - run: pip install -e ".[dev]"
      - run: alembic upgrade head

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: projects/kanban-dashboard/package-lock.json

      - run: npm ci || npm install
      - run: npx playwright install --with-deps chromium

      - name: Regenerate visual snapshots (Linux / Chromium)
        # --update-snapshots creates missing baselines and overwrites changed ones.
        # continue-on-error so the PR step still runs even if a test fails for
        # an unrelated reason (e.g. a page element not found).
        run: npx playwright test --grep "Visual regression" --update-snapshots
        continue-on-error: true

      - name: Push updated snapshots to branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tests-e2e/__screenshots__/
          if git diff --staged --quiet; then
            echo "No snapshot changes — nothing to commit."
          else
            git commit -m "test(e2e): regenerate Linux Playwright snapshots"
            git push origin HEAD:${{ github.event.inputs.target_branch || 'chore/linux-playwright-snapshots' }}
            echo "Snapshots pushed to ${{ github.event.inputs.target_branch || 'chore/linux-playwright-snapshots' }}"
          fi
