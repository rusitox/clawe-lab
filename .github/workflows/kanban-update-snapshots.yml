name: Kanban — Regenerate Playwright snapshots (Linux)

# Run manually to regenerate Linux visual regression baselines.
# After the resulting PR is merged, remove --grep-invert "Visual regression"
# from kanban-ci.yml so visual tests run on every CI pass.
on:
  workflow_dispatch:

defaults:
  run:
    working-directory: projects/kanban-dashboard

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "22"
  DATABASE_URL: postgresql+psycopg://kanban:kanban@127.0.0.1:5432/kanban
  DATABASE_URL_TEST: postgresql+psycopg://kanban:kanban@127.0.0.1:5432/kanban_test
  TEST_AUTH_BYPASS: "true"
  APP_ENV: development

jobs:
  update-snapshots:
    name: Regenerate Linux snapshots
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: kanban
          POSTGRES_PASSWORD: kanban
          POSTGRES_DB: kanban
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kanban"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: projects/kanban-dashboard/pyproject.toml

      - run: pip install -e ".[dev]"
      - run: alembic upgrade head

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: projects/kanban-dashboard/package-lock.json

      - run: npm ci || npm install
      - run: npx playwright install --with-deps chromium

      - name: Regenerate visual snapshots (Linux / Chromium)
        # --update-snapshots creates missing baselines and overwrites changed ones.
        # continue-on-error so the PR step still runs even if a test fails for
        # an unrelated reason (e.g. a page element not found).
        run: npx playwright test --grep "Visual regression" --update-snapshots
        continue-on-error: true

      - name: Open PR with updated snapshots
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/linux-playwright-snapshots
          commit-message: "test(e2e): regenerate Linux Playwright snapshots"
          title: "test(e2e): Linux visual regression snapshots"
          body: |
            Automatically generated by the **Kanban — Regenerate Playwright snapshots (Linux)** workflow.

            Captures `ubuntu-latest / Chromium` reference screenshots for visual regression tests.

            **After merging this PR:**
            Remove `--grep-invert "Visual regression"` from `.github/workflows/kanban-ci.yml` so
            visual regression tests run on every CI pass going forward.
