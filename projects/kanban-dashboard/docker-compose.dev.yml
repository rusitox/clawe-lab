services:
  db:
    image: postgres:16-alpine
    container_name: openclaw-kanban-db-dev
    environment:
      POSTGRES_USER: kanban
      POSTGRES_PASSWORD: kanban
      POSTGRES_DB: kanban
    ports:
      - "5433:5432"
    volumes:
      - kanban_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kanban -d kanban"]
      interval: 2s
      timeout: 2s
      retries: 20

volumes:
  kanban_pg_data:
