<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Members — Clawe HQ</title>
<link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
<div class="app-shell">
  <header class="topbar">
    <span class="brand"><span class="brand-mark">🐾</span> Clawe Kanban</span>
    <span class="breadcrumb"><span class="sep">/</span> <a href="./board.html">Clawe HQ</a> <span class="sep">/</span> Members</span>
    <span class="spacer"></span>
    <span class="avatar avatar-sm">MO</span>
  </header>
  <main>
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom: var(--space-4);">
      <h1 class="page-title" style="margin:0;">Members</h1>
      <button class="btn btn-primary">+ Invite</button>
    </div>
    <div class="list">
      <div class="list-row">
        <span class="avatar">MO</span>
        <div class="grow">
          <div><strong>Marian Ortega</strong></div>
          <div class="muted" style="font-size: var(--font-xs);">marian@…</div>
        </div>
        <span class="role-tag role-owner">owner</span>
        <button class="btn btn-sm" disabled>Promote another to owner first</button>
      </div>
      <div class="list-row">
        <span class="avatar">JP</span>
        <div class="grow">
          <div><strong>Juan Pérez</strong></div>
          <div class="muted" style="font-size: var(--font-xs);">juan@…</div>
        </div>
        <span class="role-tag">editor</span>
        <button class="btn btn-sm">Change ▾</button>
        <button class="btn btn-sm btn-danger">Remove</button>
      </div>
      <div class="list-row">
        <span class="avatar">AL</span>
        <div class="grow">
          <div><strong>Ana López</strong></div>
          <div class="muted" style="font-size: var(--font-xs);">ana@…</div>
        </div>
        <span class="role-tag">viewer</span>
        <button class="btn btn-sm">Change ▾</button>
        <button class="btn btn-sm btn-danger">Remove</button>
      </div>
    </div>
    <p style="margin-top: var(--space-12);"><a href="./index.html" class="muted">← back to preview index</a></p>
  </main>
</div>
<script src="./js/preview.js"></script>
</body>
</html>
