<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Board (mobile) — Clawe HQ</title>
<link rel="stylesheet" href="./css/styles.css" />
<style>
  body { background: #1d2230; padding: var(--space-6); display: grid; place-items: center; min-height: 100vh; }
  .phone { width: 390px; height: 844px; background: var(--color-bg); border-radius: 36px; box-shadow: var(--shadow-lg); overflow: hidden; display: flex; flex-direction: column; border: 8px solid #0f1115; }
  .phone-status { height: 24px; background: var(--color-bg); }
  [data-theme="dark"] .phone { box-shadow: 0 24px 60px rgba(0,0,0,.6); }
</style>
</head>
<body>
  <div class="phone">
    <div class="phone-status"></div>
    <div style="display:flex; flex-direction:column; flex:1; overflow-y: auto;">
      <header class="topbar" style="padding: var(--space-3) var(--space-4); gap: var(--space-2);">
        <button class="btn btn-icon" aria-label="Open menu">☰</button>
        <span class="brand" style="font-size: var(--font-sm);">Clawe HQ ▾</span>
        <span class="spacer"></span>
        <span class="avatar avatar-sm">MO</span>
      </header>

      <div role="tablist" class="column-tabs" style="margin: var(--space-3); padding: var(--space-1);">
        <button class="column-tab" role="tab">Backlog · 4</button>
        <button class="column-tab" role="tab" aria-selected="true">Todo · 3</button>
        <button class="column-tab" role="tab">In&nbsp;progress · 2</button>
        <button class="column-tab" role="tab">Done · 12</button>
      </div>

      <div class="board-mobile">
        <article class="task-card" tabindex="0" style="--team-color: #ef4444;">
          <div class="row"><span class="kind-badge kind-bug">B</span><span class="priority priority-P0">P0</span></div>
          <div class="title">Login throws 500 on Safari 17</div>
          <div class="footer"><span class="avatar avatar-sm">MO</span><span class="muted" style="font-size:var(--font-xs);">📎 1  💬 3</span></div>
        </article>
        <article class="task-card" tabindex="0" style="--team-color: #14b8a6;">
          <div class="row"><span class="kind-badge kind-task">T</span><span class="priority priority-P1">P1</span></div>
          <div class="title">Wire activity feed polling</div>
          <div class="footer"><span class="avatar avatar-sm">JP</span><span class="muted" style="font-size:var(--font-xs);">Move ↕</span></div>
        </article>
        <article class="task-card" tabindex="0" style="--team-color: #f59e0b;">
          <div class="row"><span class="kind-badge kind-task">T</span></div>
          <div class="title">Email allow-list config</div>
          <div class="footer"><span class="avatar avatar-sm">MO</span><span class="muted" style="font-size:var(--font-xs);">Move ↕</span></div>
        </article>
      </div>

      <div style="position: sticky; bottom: 0; padding: var(--space-3) var(--space-4); background: var(--color-surface); border-top: 1px solid var(--color-border);">
        <button class="btn btn-primary" style="width:100%;">+ New task</button>
      </div>
    </div>
  </div>
  <p style="margin-top: var(--space-6); text-align:center; color: #fff;"><a href="./index.html" style="color: var(--color-brand-50);">← back to preview index</a></p>
<script src="./js/preview.js"></script>
</body>
</html>
