<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
              "brand": {
                "DEFAULT": "#3b5bdb",
                "hover": "#2f49b8",
                "active": "#25399a"
              },
              "surface": {
                "DEFAULT": "#ffffff",
                "page": "#f7f8fb",
                "border": "#e3e6ec"
              },
              "text": {
                "primary": "#14171f",
                "muted": "#5b6477"
              }
            },
            "borderRadius": {
                    "DEFAULT": "4px",
                    "sm": "4px",
                    "md": "8px",
                    "lg": "12px",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Inter", "sans-serif"],
                    "display": ["Inter", "sans-serif"],
                    "body": ["Inter", "sans-serif"],
                    "label": ["Inter", "sans-serif"]
            },
            "boxShadow": {
                "subtle-sm": "0 1px 2px rgba(0,0,0,.04)",
                "subtle-md": "0 2px 6px rgba(0,0,0,.06)",
                "subtle-lg": "0 12px 32px rgba(0,0,0,.10)"
            }
          },
        },
      }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
          font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
          display: inline-block;
          line-height: 1;
          text-transform: none;
          letter-spacing: normal;
          word-wrap: normal;
          white-space: nowrap;
          direction: ltr;
        }
        @keyframes spin {
          from { transform: rotate(0deg); }
          to { transform: rotate(360deg); }
        }
        .animate-spin-custom {
          animation: spin 1s linear infinite;
        }
    </style>
</head>
<body class="bg-surface-page min-h-screen flex flex-col items-center justify-center text-text-primary">
<!-- TopAppBar from JSON Logic -->
<header class="fixed top-0 w-full flex justify-between items-center px-8 py-6 bg-[#f7f8fb] dark:bg-slate-950 font-['Inter'] text-sm font-medium">
<div class="text-xl font-semibold text-[#14171f] dark:text-white tracking-tight">Clawe 🐾</div>
<div class="flex items-center gap-6">
<span class="text-[#5b6477] dark:text-slate-400 hover:text-[#2f49b8] transition-colors cursor-pointer active:opacity-80">Support</span>
</div>
</header>
<main class="flex-grow flex items-center justify-center w-full px-4">
<!-- Login Card -->
<div class="w-full max-w-[360px] bg-white rounded-lg border border-surface-border shadow-subtle-md p-8">
<div class="flex flex-col items-center text-center mb-8">
<div class="w-12 h-12 bg-brand/10 rounded-lg flex items-center justify-center mb-4">
<span class="material-symbols-outlined text-brand text-3xl">login</span>
</div>
<h1 class="text-2xl font-semibold tracking-tight text-text-primary">Welcome back</h1>
<p class="text-sm text-text-muted mt-2">Access your Kanban boards and tasks</p>
</div>
<form class="space-y-4" onsubmit="return false;">
<div>
<label class="block text-[12px] font-medium text-text-muted mb-1.5" for="email">Email Address</label>
<input class="w-full px-3 py-2 bg-slate-50 border border-surface-border rounded-md text-sm text-text-muted focus:outline-none cursor-not-allowed" disabled="" id="email" type="email" value="user@openclaw.dev"/>
</div>
<div>
<label class="block text-[12px] font-medium text-text-muted mb-1.5" for="password">Password</label>
<input class="w-full px-3 py-2 bg-slate-50 border border-surface-border rounded-md text-sm text-text-muted focus:outline-none cursor-not-allowed" disabled="" id="password" type="password" value="••••••••••••"/>
</div>
<div class="flex items-center justify-between py-1">
<div class="flex items-center">
<input class="h-4 w-4 text-brand focus:ring-brand border-gray-300 rounded" disabled="" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block text-[12px] text-text-muted" for="remember-me">Remember me</label>
</div>
<div class="text-[12px]">
<span class="font-medium text-text-muted cursor-not-allowed">Forgot password?</span>
</div>
</div>
<!-- LOADING STATE BUTTON -->
<button class="w-full flex items-center justify-center gap-2 px-4 py-2.5 bg-brand text-white text-sm font-medium rounded-md opacity-60 cursor-not-allowed transition-all duration-200" disabled="" type="button">
<span class="material-symbols-outlined text-[20px] animate-spin-custom">progress_activity</span>
                    Signing you in...
                </button>
</form>
<div class="mt-8 pt-6 border-t border-surface-border">
<p class="text-center text-[12px] text-text-muted">
                    Don't have an account? 
                    <span class="text-brand font-medium cursor-not-allowed">Contact your admin</span>
</p>
</div>
</div>
</main>
<!-- Footer from JSON Logic -->
<footer class="fixed bottom-0 w-full flex flex-col items-center pb-8 gap-4 bg-transparent">
<div class="flex gap-4">
<span class="text-[#5b6477] dark:text-slate-500 font-['Inter'] text-[12px] font-normal hover:underline hover:text-[#14171f] dark:hover:text-white transition-all duration-200 cursor-pointer">Privacy</span>
<span class="text-[#5b6477] dark:text-slate-500 font-['Inter'] text-[12px] font-normal hover:underline hover:text-[#14171f] dark:hover:text-white transition-all duration-200 cursor-pointer">Terms</span>
<span class="text-[#5b6477] dark:text-slate-500 font-['Inter'] text-[12px] font-normal hover:underline hover:text-[#14171f] dark:hover:text-white transition-all duration-200 cursor-pointer">Security</span>
</div>
<div class="flex flex-col items-center gap-1">
<span class="text-[#5b6477] dark:text-slate-500 font-['Inter'] text-[12px] font-normal">© 2024 OpenClaw. Built for focus.</span>
<span class="text-[#5b6477] dark:text-slate-500 font-['Inter'] text-[12px] font-normal">Need help? <span class="underline cursor-pointer hover:text-brand">open the issue tracker.</span></span>
</div>
</footer>
<!-- Decorative Aesthetic Elements -->
<div class="fixed top-0 left-0 w-full h-full pointer-events-none -z-10 opacity-40">
<div class="absolute top-[10%] left-[15%] w-64 h-64 bg-brand/5 rounded-full blur-3xl"></div>
<div class="absolute bottom-[20%] right-[10%] w-96 h-96 bg-brand/5 rounded-full blur-3xl"></div>
</div>
</body></html>
