<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Clawe Kanban - Create Task</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=JetBrains+Mono&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        brand: "#3b5bdb",
                        brandHover: "#2f49b8",
                        brandActive: "#25399a",
                        surface: "#ffffff",
                        pageBg: "#f7f8fb",
                        border: "#e3e6ec",
                        textPrimary: "#14171f",
                        textMuted: "#5b6477",
                        success: "#15803d",
                        warning: "#b45309",
                        danger: "#b91c1c",
                        info: "#0369a1"
                    },
                    borderRadius: {
                        "DEFAULT": "4px",
                        "sm": "4px",
                        "md": "8px",
                        "lg": "12px",
                        "full": "9999px"
                    },
                    fontFamily: {
                        sans: ["Inter", "system-ui", "sans-serif"],
                        mono: ["JetBrains Mono", "monospace"]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 20;
            font-size: 18px;
        }
        .scrim-overlay {
            background-color: rgba(20, 23, 31, 0.45);
        }
    </style>
</head>
<body class="bg-pageBg font-sans text-textPrimary antialiased overflow-hidden">
<!-- Background Board (Faded Content) -->
<div class="fixed inset-0 flex flex-col opacity-35 select-none pointer-events-none">
<!-- TopNavBar Mock -->
<header class="bg-white border-b border-border h-14 px-6 flex items-center justify-between">
<div class="flex items-center gap-6">
<span class="text-lg font-bold text-textPrimary flex items-center gap-2">Clawe Kanban</span>
<nav class="flex gap-4">
<span class="text-sm font-semibold border-b-2 border-brand pb-1">Projects</span>
<span class="text-sm text-textMuted">My Tasks</span>
<span class="text-sm text-textMuted">Activity</span>
</nav>
</div>
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-textMuted">notifications</span>
<div class="w-8 h-8 rounded-full bg-gray-200"></div>
</div>
</header>
<div class="flex flex-1">
<!-- SideNav Mock -->
<aside class="w-64 border-r border-border p-4 bg-pageBg space-y-2">
<div class="bg-border/50 rounded-md p-2 flex items-center gap-3">
<span class="material-symbols-outlined text-brand">dashboard</span>
<span class="text-xs font-medium">Dashboard</span>
</div>
<div class="p-2 flex items-center gap-3 text-textMuted">
<span class="material-symbols-outlined">view_kanban</span>
<span class="text-xs font-medium">Board</span>
</div>
</aside>
<!-- Kanban Columns Mock -->
<main class="flex-1 p-6 flex gap-6 overflow-hidden">
<div class="w-72 flex-shrink-0">
<div class="flex items-center justify-between mb-4">
<span class="text-xs font-semibold uppercase tracking-wider text-textMuted">Todo</span>
</div>
<div class="space-y-3">
<div class="bg-white border-l-4 border-l-brand p-3 rounded shadow-sm border border-border">
<div class="flex items-center gap-2 mb-2">
<span class="w-4 h-4 rounded-full bg-gray-100 flex items-center justify-center text-[10px] font-bold">T</span>
<span class="text-[10px] font-medium text-textMuted">AUTH-102</span>
</div>
<div class="text-sm font-medium">Update session provider</div>
</div>
</div>
</div>
<div class="w-72 flex-shrink-0">
<div class="flex items-center justify-between mb-4">
<span class="text-xs font-semibold uppercase tracking-wider text-textMuted">In Progress</span>
</div>
</div>
</main>
</div>
</div>
<!-- Scrim & Modal Container -->
<div class="fixed inset-0 scrim-overlay flex items-center justify-center p-4 z-50">
<!-- Task Creation Modal -->
<div class="bg-white w-full max-w-[560px] rounded-lg shadow-lg flex flex-col overflow-hidden border border-border">
<!-- Modal Header -->
<div class="flex items-center justify-between px-6 py-4 border-b border-border">
<h2 class="text-base font-semibold text-textPrimary">New Task</h2>
<button class="text-textMuted hover:text-textPrimary transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<!-- Modal Body -->
<div class="flex-1 overflow-y-auto p-6 space-y-6">
<!-- Kind Switcher -->
<div class="space-y-3">
<div class="flex p-1 bg-pageBg border border-border rounded-md">
<button class="flex-1 flex items-center justify-center gap-2 py-1.5 text-xs font-medium text-textMuted hover:text-textPrimary">
<span class="w-[18px] h-[18px] rounded-full bg-gray-200 text-[10px] flex items-center justify-center text-textMuted">T</span>
                            Task
                        </button>
<button class="flex-1 flex items-center justify-center gap-2 py-1.5 text-xs font-semibold text-brand bg-[#eef1ff] border border-brand/20 rounded-sm shadow-sm">
<span class="w-[18px] h-[18px] rounded-full bg-danger text-[10px] flex items-center justify-center text-white">B</span>
                            Bug
                        </button>
<button class="flex-1 flex items-center justify-center gap-2 py-1.5 text-xs font-medium text-textMuted hover:text-textPrimary">
<span class="w-[18px] h-[18px] rounded-full bg-info text-[10px] flex items-center justify-center text-white">P</span>
                            Proposal
                        </button>
</div>
<p class="text-[12px] text-info flex items-center gap-1.5 px-1">
<span class="material-symbols-outlined text-[16px]">info</span>
                        We'll prefill repro / expected / actual.
                    </p>
</div>
<!-- Title Input -->
<div class="space-y-1.5">
<label class="text-[12px] font-medium text-textMuted">Title</label>
<input class="w-full bg-transparent text-base font-medium border-none p-0 focus:ring-0 placeholder:text-textMuted/40" placeholder="What's broken or needed?" type="text"/>
<div class="h-[1px] w-full bg-border"></div>
</div>
<!-- Selects & Meta -->
<div class="grid grid-cols-2 gap-x-8 gap-y-4">
<div class="space-y-1.5">
<label class="text-[12px] font-medium text-textMuted uppercase tracking-tight">Column</label>
<button class="w-full flex items-center justify-between px-2 py-1.5 bg-pageBg border border-border rounded text-[13px] hover:bg-border/30 transition-colors">
<div class="flex items-center gap-2">
<div class="w-2 h-2 rounded-full bg-gray-300"></div>
<span>Todo</span>
</div>
<span class="material-symbols-outlined text-textMuted text-[16px]">expand_more</span>
</button>
</div>
<div class="space-y-1.5">
<label class="text-[12px] font-medium text-textMuted uppercase tracking-tight">Priority</label>
<button class="w-full flex items-center justify-between px-2 py-1.5 bg-pageBg border border-border rounded text-[13px] hover:bg-border/30 transition-colors">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-danger text-[16px]" style="font-variation-settings: 'FILL' 1;">signal_cellular_4_bar</span>
<span>P0</span>
</div>
<span class="material-symbols-outlined text-textMuted text-[16px]">expand_more</span>
</button>
</div>
<div class="space-y-1.5">
<label class="text-[12px] font-medium text-textMuted uppercase tracking-tight">Team</label>
<button class="w-full flex items-center justify-between px-2 py-1.5 bg-pageBg border border-border rounded text-[13px] hover:bg-border/30 transition-colors">
<div class="flex items-center gap-2">
<div class="w-3 h-3 rounded-sm bg-brand"></div>
<span>Auth</span>
</div>
<span class="material-symbols-outlined text-textMuted text-[16px]">expand_more</span>
</button>
</div>
<div class="space-y-1.5">
<label class="text-[12px] font-medium text-textMuted uppercase tracking-tight">Assignees</label>
<div class="flex items-center -space-x-1.5">
<div class="w-7 h-7 rounded-full border-2 border-white bg-indigo-500 flex items-center justify-center text-[10px] font-bold text-white uppercase shadow-sm">MO</div>
<button class="w-7 h-7 rounded-full border-2 border-white bg-pageBg flex items-center justify-center hover:bg-border transition-colors shadow-sm">
<span class="material-symbols-outlined text-[16px] text-textMuted">add</span>
</button>
</div>
</div>
</div>
<!-- Description Tabs & Markdown -->
<div class="space-y-3">
<div class="flex items-center justify-between border-b border-border">
<div class="flex gap-4">
<button class="pb-2 text-[13px] font-semibold text-textPrimary border-b-2 border-textPrimary">Write</button>
<button class="pb-2 text-[13px] font-medium text-textMuted hover:text-textPrimary transition-colors">Preview</button>
</div>
<span class="material-symbols-outlined text-textMuted text-[18px] pb-2 cursor-pointer">fullscreen</span>
</div>
<div class="relative">
<textarea class="w-full font-mono text-[13px] bg-pageBg border border-border rounded-md p-3 focus:ring-1 focus:ring-brand focus:border-brand resize-none leading-relaxed text-textPrimary" rows="6" spellcheck="false">## Steps
1. 

## Expected


## Actual</textarea>
</div>
</div>
<!-- Attachments Dropzone -->
<div class="space-y-3">
<label class="text-[12px] font-medium text-textMuted">Attachments</label>
<div class="border-2 border-dashed border-border rounded-lg p-6 bg-pageBg/50 flex flex-col items-center justify-center group hover:border-brand/40 hover:bg-pageBg transition-all cursor-pointer">
<span class="material-symbols-outlined text-textMuted group-hover:text-brand mb-2 text-2xl">upload_file</span>
<p class="text-[13px] text-textMuted"><span class="font-medium text-brand">⤴ Drop files</span> / images here...</p>
</div>
<!-- Staged File -->
<div class="flex items-center justify-between px-3 py-2 bg-white border border-border rounded group">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-brand">image</span>
<div class="flex flex-col">
<span class="text-[13px] font-medium">screenshot.png</span>
<span class="text-[11px] text-textMuted">142 KB</span>
</div>
</div>
<button class="p-1 opacity-0 group-hover:opacity-100 hover:bg-pageBg rounded transition-all">
<span class="material-symbols-outlined text-danger text-[18px]">delete</span>
</button>
</div>
</div>
</div>
<!-- Modal Footer -->
<div class="px-6 py-4 bg-pageBg/30 border-t border-border flex items-center justify-end gap-3">
<button class="px-4 py-2 text-[14px] font-medium text-textMuted hover:text-textPrimary hover:bg-pageBg transition-colors rounded">Cancel</button>
<button class="px-4 py-2 bg-brand hover:bg-brandHover active:bg-brandActive text-white text-[14px] font-semibold rounded shadow-sm transition-all">Create Task</button>
</div>
</div>
</div>
</body></html>
