<!DOCTYPE html>

<html class="h-full bg-[#f7f8fb]" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sign In - Clawe</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                "brand": "#3b5bdb",
                "brand-hover": "#2f49b8",
                "brand-active": "#25399a",
                "surface": "#ffffff",
                "page-bg": "#f7f8fb",
                "border-neutral": "#e3e6ec",
                "text-primary": "#14171f",
                "text-muted": "#5b6477",
                "danger": "#b91c1c",
                "danger-light": "#fee2e2"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "sm": "4px",
                    "md": "8px",
                    "lg": "12px",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Inter", "sans-serif"],
                    "display": ["Inter", "sans-serif"],
                    "body": ["Inter", "sans-serif"],
                    "label": ["Inter", "sans-serif"]
            },
            "boxShadow": {
                "subtle-md": "0 2px 6px rgba(0,0,0,.06)"
            }
          },
        },
      }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="h-full flex flex-col antialiased text-text-primary">
<header class="bg-[#f7f8fb] dark:bg-slate-950 flex justify-between items-center w-full px-8 py-6 font-['Inter'] text-sm font-medium">
<div class="text-xl font-semibold text-[#14171f] dark:text-white tracking-tight">Clawe 🐾</div>
<div class="flex items-center gap-6">
<span class="text-[#5b6477] dark:text-slate-400 cursor-pointer hover:text-[#2f49b8] transition-colors">Support</span>
</div>
</header>
<main class="flex-grow flex items-center justify-center px-4 py-12">
<div class="w-full max-w-[360px] bg-white rounded-lg shadow-subtle-md border border-border-neutral p-8 flex flex-col items-center">
<div class="mb-8 text-center">
<div class="w-12 h-12 bg-brand/10 rounded-lg flex items-center justify-center mb-4 mx-auto">
<span class="material-symbols-outlined text-brand" style="font-variation-settings: 'FILL' 1;">login</span>
</div>
<h1 class="text-2xl font-bold tracking-tight text-text-primary">Sign in</h1>
<p class="text-text-muted text-sm mt-2">Manage your team's kanban flow</p>
</div>
<div class="w-full space-y-4">
<div class="bg-[#fee2e2] text-[#b91c1c] text-sm p-3 rounded-md flex gap-3 items-start border border-danger/10" role="alert">
<span class="material-symbols-outlined text-sm mt-0.5" style="font-variation-settings: 'wght' 600;">error</span>
<p class="leading-snug">
                        We couldn't sign you in. Try again or <span class="underline cursor-pointer font-medium">contact support</span>.
                    </p>
</div>
<button class="w-full flex items-center justify-center gap-3 bg-brand hover:bg-brand-hover active:bg-brand-active text-white py-2.5 px-4 rounded-md font-medium transition-all duration-200 cursor-pointer">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="currentColor"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="currentColor"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="currentColor"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="currentColor"></path>
</svg>
                    Continue with Google
                </button>
<div class="relative py-4">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-border-neutral"></div>
</div>
<div class="relative flex justify-center text-xs uppercase">
<span class="bg-white px-2 text-text-muted">Or identity provider</span>
</div>
</div>
<div class="space-y-3">
<div class="space-y-1">
<label class="text-xs font-medium text-text-muted px-1" for="email">Work Email</label>
<input class="w-full px-3 py-2 text-sm border border-border-neutral rounded-md focus:ring-1 focus:ring-brand focus:border-brand transition-all outline-none" id="email" placeholder="name@company.com" type="email"/>
</div>
<button class="w-full bg-white hover:bg-slate-50 border border-border-neutral text-text-primary py-2 px-4 rounded-md text-sm font-medium transition-colors">
                        Send magic link
                    </button>
</div>
</div>
<div class="mt-8 text-center">
<p class="text-xs text-text-muted">
                    Need help? <a class="text-brand hover:underline" href="#">open the issue tracker.</a>
</p>
</div>
</div>
</main>
<footer class="fixed bottom-0 w-full flex flex-col items-center pb-8 gap-4 bg-transparent transition-all duration-200">
<div class="flex gap-4">
<span class="text-[#5b6477] dark:text-slate-500 font-['Inter'] text-[12px] font-normal hover:underline hover:text-[#14171f] dark:hover:text-white cursor-pointer">Privacy</span>
<span class="text-[#5b6477] dark:text-slate-500 font-['Inter'] text-[12px] font-normal hover:underline hover:text-[#14171f] dark:hover:text-white cursor-pointer">Terms</span>
<span class="text-[#5b6477] dark:text-slate-500 font-['Inter'] text-[12px] font-normal hover:underline hover:text-[#14171f] dark:hover:text-white cursor-pointer">Security</span>
</div>
<div class="text-[#5b6477] dark:text-slate-500 font-['Inter'] text-[12px] font-normal">© 2024 OpenClaw. Built for focus.</div>
</footer>
</body></html>
